<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>DocTalk — Chat with your documents</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --deep: #04060a;
        --ink: #0c1018;
        --panel: rgba(14, 18, 28, 0.65);
        --panel-strong: rgba(18, 24, 38, 0.88);
        --stroke: rgba(255, 255, 255, 0.08);
        --stroke-bright: rgba(110, 231, 183, 0.35);
        --text: rgba(246, 248, 252, 0.96);
        --muted: rgba(180, 194, 220, 0.72);
        --faint: rgba(148, 163, 188, 0.45);
        --mint: #6ee7b7;
        --mint-dim: #34d399;
        --violet: #a78bfa;
        --rose: #fb7185;
        --danger: #f87171;
        --radius-xl: clamp(18px, 3vw, 28px);
        --shadow-lg: 0 24px 80px rgba(0, 0, 0, 0.55);
        --font-sans: "DM Sans", system-ui, sans-serif;
        --font-display: "Fraunces", Georgia, serif;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        font-family: var(--font-sans);
        background: var(--deep);
        color: var(--text);
        overflow-x: hidden;
        letter-spacing: 0.01em;
      }

      /* Ambient layered background */
      .ambient {
        position: fixed;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 0;
      }

      .ambient::before {
        content: "";
        position: absolute;
        inset: -40%;
        background:
          radial-gradient(ellipse 50% 40% at 15% 20%, rgba(110, 231, 183, 0.12), transparent 55%),
          radial-gradient(ellipse 45% 35% at 85% 15%, rgba(167, 139, 250, 0.1), transparent 50%),
          radial-gradient(ellipse 60% 50% at 50% 100%, rgba(251, 113, 133, 0.08), transparent 45%),
          linear-gradient(180deg, var(--deep) 0%, var(--ink) 100%);
      }

      .orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.55;
        animation: drift 22s ease-in-out infinite alternate;
      }

      .orb.one {
        width: min(55vw, 420px);
        height: min(55vw, 420px);
        background: radial-gradient(circle, rgba(110, 231, 183, 0.55), transparent 65%);
        top: -8%;
        left: -12%;
      }

      .orb.two {
        width: min(48vw, 380px);
        height: min(48vw, 380px);
        background: radial-gradient(circle, rgba(167, 139, 250, 0.45), transparent 65%);
        bottom: -5%;
        right: -18%;
        animation-delay: -8s;
        animation-duration: 26s;
      }

      @keyframes drift {
        0% {
          transform: translate(0, 0) scale(1);
        }
        100% {
          transform: translate(3vw, 2vh) scale(1.08);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .orb {
          animation: none;
          opacity: 0.35;
        }
      }

      /* Fine noise texture */
      .grain {
        position: fixed;
        inset: 0;
        opacity: 0.04;
        pointer-events: none;
        z-index: 1;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      }

      .shell {
        position: relative;
        z-index: 2;
        min-height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: clamp(1.25rem, 4vw, 3rem);
        padding-bottom: 2rem;
      }

      .brand-row {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 1rem;
      }

      .logo-mark {
        width: 40px;
        height: 40px;
        border-radius: 12px;
        background: linear-gradient(135deg, var(--mint), var(--violet));
        display: grid;
        place-items: center;
        font-weight: 700;
        font-size: 0.95rem;
        color: var(--deep);
        box-shadow: 0 8px 32px rgba(110, 231, 183, 0.25);
      }

      .brand-copy h1 {
        font-family: var(--font-display);
        font-weight: 600;
        font-size: clamp(1.6rem, 4vw, 2.05rem);
        margin: 0;
        letter-spacing: -0.03em;
        line-height: 1.05;
      }

      .brand-copy p.tag {
        margin: 0.2rem 0 0;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .card {
        width: min(100%, 620px);
        background: var(--panel);
        backdrop-filter: blur(28px);
        border: 1px solid var(--stroke);
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow-lg);
        padding: clamp(1.5rem, 4vw, 2.35rem);
        position: relative;
        overflow: hidden;
      }

      .card::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        border-radius: inherit;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.06),
          inset 0 -1px 0 rgba(0, 0, 0, 0.15);
      }

      /* Views */
      .view {
        display: none;
        flex-direction: column;
        gap: 1rem;
      }

      .view.active {
        display: flex;
      }

      .dropzone {
        position: relative;
        border-radius: calc(var(--radius-xl) - 6px);
        padding: clamp(2.25rem, 5vw, 3.25rem) 1.5rem;
        text-align: center;
        cursor: pointer;
        transition:
          transform 0.25s ease,
          border-color 0.25s ease,
          background 0.25s ease;
        border: 1.5px dashed rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.02);
      }

      .dropzone:hover {
        border-color: rgba(110, 231, 183, 0.35);
        background: rgba(110, 231, 183, 0.04);
      }

      .dropzone.drag-over {
        transform: scale(1.015);
        border-color: var(--stroke-bright);
        background: rgba(110, 231, 183, 0.08);
        box-shadow:
          0 0 0 1px rgba(110, 231, 183, 0.2),
          0 0 48px rgba(110, 231, 183, 0.12);
      }

      .dropzone-inner {
        position: relative;
        z-index: 1;
      }

      .drop-icon {
        width: 52px;
        height: 52px;
        margin: 0 auto 1rem;
        border-radius: 14px;
        background: linear-gradient(
          145deg,
          rgba(167, 139, 250, 0.2),
          rgba(110, 231, 183, 0.15)
        );
        border: 1px solid rgba(255, 255, 255, 0.08);
        display: grid;
        place-items: center;
      }

      .drop-title {
        font-family: var(--font-display);
        font-weight: 600;
        font-size: 1.15rem;
        margin: 0 0 0.35rem;
      }

      .drop-hint {
        margin: 0;
        font-size: 0.875rem;
        color: var(--muted);
      }

      .pill-row {
        display: flex;
        gap: 0.5rem;
        justify-content: center;
        margin-top: 1rem;
        flex-wrap: wrap;
      }

      .pill {
        font-size: 0.72rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        padding: 0.35rem 0.65rem;
        border-radius: 999px;
        border: 1px solid var(--stroke);
        color: var(--muted);
      }

      #file-input {
        display: none;
      }

      .file-meta {
        margin-top: 1.15rem;
        padding: 0.75rem 1rem;
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.25);
        border: 1px solid var(--stroke);
        font-size: 0.85rem;
        color: var(--muted);
        display: none;
        align-items: center;
        gap: 0.5rem;
      }

      .file-meta.visible {
        display: flex;
      }

      .file-meta strong {
        color: var(--text);
        font-weight: 500;
      }

      .actions {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        margin-top: 0.5rem;
      }

      .btn {
        font-family: inherit;
        font-weight: 600;
        font-size: 0.95rem;
        border: none;
        border-radius: 12px;
        padding: 0.9rem 1.25rem;
        cursor: pointer;
        transition:
          transform 0.15s ease,
          box-shadow 0.2s ease,
          opacity 0.2s ease;
      }

      .btn:disabled {
        opacity: 0.38;
        cursor: not-allowed;
      }

      .btn-primary:not(:disabled):hover {
        transform: translateY(-1px);
        box-shadow: 0 12px 36px rgba(110, 231, 183, 0.25);
      }

      .btn-primary:not(:disabled):active {
        transform: translateY(0);
      }

      .btn-primary {
        color: var(--deep);
        background: linear-gradient(135deg, var(--mint), var(--mint-dim));
      }

      #status-msg {
        min-height: 1.35rem;
        font-size: 0.875rem;
        color: var(--muted);
        text-align: center;
      }

      #status-msg.error {
        color: var(--danger);
      }

      #status-msg.success {
        color: var(--mint);
      }

      /* Chat */
      .chat-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 0.75rem;
        flex-wrap: wrap;
      }

      .chat-header h2 {
        font-family: var(--font-display);
        font-size: 1.35rem;
        margin: 0;
      }

      .link-reset {
        color: var(--mint);
        text-decoration: none;
        font-size: 0.85rem;
        font-weight: 500;
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        opacity: 0.92;
      }

      .link-reset:hover {
        text-decoration: underline;
      }

      .thread {
        height: clamp(340px, 52vh, 540px);
        overflow-y: auto;
        scroll-behavior: smooth;
        border-radius: calc(var(--radius-xl) - 10px);
        padding: 0.85rem;
        margin: 0 -0.85rem;
        background: rgba(4, 6, 10, 0.35);
        border: 1px solid rgba(255, 255, 255, 0.05);
        display: flex;
        flex-direction: column;
        gap: 0.65rem;
      }

      .thread::-webkit-scrollbar {
        width: 8px;
      }

      .thread::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.12);
        border-radius: 99px;
      }

      .msg {
        display: flex;
      }

      .msg.user {
        justify-content: flex-end;
      }

      .bubble {
        max-width: 88%;
        padding: 0.75rem 1rem;
        border-radius: 16px;
        font-size: 0.92rem;
        line-height: 1.52;
      }

      .msg.bot .bubble {
        background: var(--panel-strong);
        border: 1px solid var(--stroke);
        border-radius: 16px 16px 16px 4px;
        color: var(--text);
      }

      .msg.user .bubble {
        background: linear-gradient(
          145deg,
          rgba(167, 139, 250, 0.25),
          rgba(110, 231, 183, 0.12)
        );
        border: 1px solid rgba(167, 139, 250, 0.2);
        border-radius: 16px 16px 4px 16px;
      }

      .typing {
        color: var(--faint);
        font-style: italic;
        animation: blink 1.1s ease-in-out infinite alternate;
      }

      @keyframes blink {
        from {
          opacity: 0.45;
        }
        to {
          opacity: 1;
        }
      }

      details.sources {
        margin-top: 0.5rem;
        font-size: 0.77rem;
        color: var(--muted);
      }

      details.sources summary {
        cursor: pointer;
        font-weight: 600;
        color: var(--mint-dim);
        list-style: none;
        padding: 0.25rem 0;
      }

      details.sources summary::-webkit-details-marker {
        display: none;
      }

      details.sources summary::after {
        content: "⌄";
        float: right;
        transition: transform 0.2s ease;
        opacity: 0.65;
      }

      details.sources[open] summary::after {
        transform: rotate(180deg);
      }

      .source-item {
        margin-top: 0.65rem;
        padding: 0.55rem 0.65rem;
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.25);
        border-left: 2px solid var(--stroke-bright);
        font-family:
          ui-monospace,
          "Cascadia Code",
          monospace;
        line-height: 1.4;
      }

      .page-badge {
        display: inline-block;
        margin-bottom: 0.35rem;
        padding: 0.15rem 0.45rem;
        border-radius: 6px;
        font-size: 0.68rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        background: rgba(167, 139, 250, 0.2);
        color: var(--violet);
      }

      .compose {
        margin-top: 0.85rem;
        display: flex;
        gap: 0.65rem;
        align-items: stretch;
      }

      .compose input {
        flex: 1;
        font-family: inherit;
        font-size: 0.92rem;
        padding: 0.85rem 1rem;
        border-radius: 12px;
        border: 1px solid var(--stroke);
        background: rgba(0, 0, 0, 0.35);
        color: var(--text);
        outline: none;
        transition:
          border-color 0.2s ease,
          box-shadow 0.2s ease;
      }

      .compose input::placeholder {
        color: rgba(148, 163, 188, 0.45);
      }

      .compose input:focus {
        border-color: rgba(110, 231, 183, 0.45);
        box-shadow: 0 0 0 3px rgba(110, 231, 183, 0.12);
      }

      footer.credit {
        margin-top: 2rem;
        font-size: 0.76rem;
        color: var(--faint);
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="ambient" aria-hidden="true">
      <div class="orb one"></div>
      <div class="orb two"></div>
    </div>
    <div class="grain" aria-hidden="true"></div>

    <main class="shell">
      <div class="brand-row">
        <div class="logo-mark" aria-hidden="true">D</div>
        <div class="brand-copy">
          <h1 id="brand-title">DocTalk</h1>
          <p class="tag" id="brand-sub">Upload a document, ask anything.</p>
        </div>
      </div>

      <article class="card" aria-labelledby="brand-title">
        <section id="view-upload" class="view active" aria-label="Upload document">
          <div
            class="dropzone"
            id="dropzone"
            role="button"
            tabindex="0"
            aria-controls="file-input"
          >
            <div class="dropzone-inner">
              <div class="drop-icon" aria-hidden="true">
                <svg width="26" height="26" fill="none" viewBox="0 0 24 24">
                  <path
                    d="M12 15V3m0 0l-4 4m4-4l4 4M4 21h16"
                    stroke="url(#g)"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                  <defs>
                    <linearGradient id="g" x1="4" x2="20" y1="3" y2="21" gradientUnits="userSpaceOnUse">
                      <stop stop-color="#6ee7b7" />
                      <stop offset="1" stop-color="#a78bfa" />
                    </linearGradient>
                  </defs>
                </svg>
              </div>
              <p class="drop-title">Drop a file here</p>
              <p class="drop-hint">Or click to browse — PDF or plain text, up to 20&nbsp;MB.</p>
              <div class="pill-row" aria-hidden="true">
                <span class="pill">.pdf</span>
                <span class="pill">.txt</span>
                <span class="pill">grounded answers</span>
              </div>
            </div>
          </div>
          <input type="file" id="file-input" accept=".pdf,.txt,application/pdf,text/plain" />

          <div id="file-meta" class="file-meta" role="status">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6Z"
                stroke="currentColor"
                stroke-width="2"
              />
              <path d="M14 2v6h6" stroke="currentColor" stroke-width="2" />
            </svg>
            Selected: <strong id="file-label">—</strong>
          </div>

          <div class="actions">
            <button type="button" class="btn btn-primary" id="upload-btn" disabled>Upload &amp; Process</button>
            <div id="status-msg" role="status"></div>
          </div>
        </section>

        <section id="view-chat" class="view" aria-label="Conversation">
          <div class="chat-header">
            <h2 id="chat-heading">Notebook</h2>
            <a href="#" id="btn-new-doc" class="link-reset">&larr; Upload new document</a>
          </div>

          <div class="thread" id="thread" aria-live="polite"></div>

          <form class="compose" id="chat-form">
            <input
              id="chat-input"
              type="text"
              autocomplete="off"
              placeholder="Ask a question about your document…"
              maxlength="8000"
            />
            <button type="submit" class="btn btn-primary" style="flex-shrink: 0">Send</button>
          </form>
          <div id="chat-error" class="typing" role="alert" style="min-height: 1.2rem"></div>
        </section>
      </article>

      <footer class="credit">Answers are generated only from your uploaded sources.</footer>
    </main>

    <script>
      let currentView = "upload";
      let currentCollectionName = null;
      /** @type {{ role: 'user' | 'assistant', content: string }[]} */
      let conversationHistory = [];

      let selectedFile = null;

      const $ = (sel) => document.querySelector(sel);
      const thread = $("#thread");
      const statusMsg = $("#status-msg");
      const chatError = $("#chat-error");

      function scrollThread() {
        requestAnimationFrame(() => {
          thread.scrollTop = thread.scrollHeight;
        });
      }

      function setView(mode) {
        currentView = mode;
        document.querySelectorAll(".view").forEach((el) => el.classList.remove("active"));
        if (mode === "upload") {
          $("#view-upload").classList.add("active");
          $("#brand-sub").textContent = "Upload a document, ask anything.";
          $("#brand-title").textContent = "DocTalk";
        } else {
          $("#view-chat").classList.add("active");
          $("#brand-sub").textContent = "Grounded responses from your notebook.";
          scrollThread();
        }
      }

      function renderTypingRow() {
        const row = document.createElement("div");
        row.className = "msg bot";
        row.dataset.typingRow = "1";
        row.innerHTML = '<div class="bubble"><span class="typing">Thinking…</span></div>';
        thread.appendChild(row);
        scrollThread();
      }

      function removeTypingRow() {
        const el = thread.querySelector("[data-typing-row]");
        if (el) el.remove();
      }

      function appendMessage(role, htmlContent, metaEl) {
        const row = document.createElement("div");
        row.className = `msg ${role}`;
        const wrap = document.createElement("div");
        wrap.className = "bubble";
        wrap.innerHTML = htmlContent;
        if (metaEl) wrap.appendChild(metaEl);
        row.appendChild(wrap);
        thread.appendChild(row);
        scrollThread();
      }

      /** @param {{ pageContent: string, pageNumber: number|null }[]} sources */
      function sourcesBlock(sources) {
        if (!sources || !sources.length) return "";
        const details = document.createElement("details");
        details.className = "sources";
        details.innerHTML = "<summary>Sources</summary>";
        sources.forEach((src) => {
          const pg =
            src.pageNumber === undefined || src.pageNumber === null
              ? "N/A"
              : String(src.pageNumber);
          const div = document.createElement("div");
          div.className = "source-item";
          div.innerHTML = `<span class="page-badge">Page ${pg}</span><br>${escapeHtml(src.pageContent)}`;
          details.appendChild(div);
        });
        return details;
      }

      function escapeHtml(s) {
        const esc = {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;",
        };
        return s.replace(/[&<>"']/g, (ch) => esc[ch]);
      }

      async function submitChat(text) {
        if (!currentCollectionName) {
          chatError.textContent = "No document indexed yet.";
          return;
        }
        const safe = escapeHtml(text).replace(/\n/g, "<br>");
        appendMessage("user", safe);
        conversationHistory.push({ role: "user", content: text });

        $("#chat-input").value = "";
        chatError.textContent = "";
        renderTypingRow();

        try {
          const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ collectionName: currentCollectionName, question: text }),
          });
          const body = await res.json().catch(() => ({}));
          removeTypingRow();
          if (!res.ok) {
            chatError.textContent = body.error || "Something went wrong. Try again.";
            return;
          }
          const assistantHtml = escapeHtml(body.answer || "").replace(/\n/g, "<br>");
          const meta = sourcesBlock(body.sources || []);
          appendMessage("bot", assistantHtml, meta || undefined);
          conversationHistory.push({ role: "assistant", content: body.answer || "" });
        } catch (e) {
          removeTypingRow();
          chatError.textContent = "Network error. Check your connection and try again.";
        }
      }

      function resetNotebook() {
        currentCollectionName = null;
        conversationHistory = [];
        selectedFile = null;
        $("#file-input").value = "";
        $("#file-meta").classList.remove("visible");
        $("#upload-btn").disabled = true;
        $("#file-label").textContent = "—";
        statusMsg.textContent = "";
        statusMsg.classList.remove("error", "success");
        thread.innerHTML = "";
        chatError.textContent = "";
        setView("upload");
      }

      $("#dropzone").addEventListener("click", () => $("#file-input").click());

      $("#dropzone").addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          $("#file-input").click();
        }
      });

      $("#file-input").addEventListener("change", () => {
        const f = $("#file-input").files?.[0];
        selectedFile = f || null;
        if (!f) return;
        $("#file-label").textContent = f.name;
        $("#file-meta").classList.add("visible");
        $("#upload-btn").disabled = false;
        statusMsg.textContent = "";
        statusMsg.classList.remove("error", "success");
      });

      const dz = $("#dropzone");
      ;["dragenter", "dragover"].forEach((ev) =>
        dz.addEventListener(ev, (e) => {
          e.preventDefault();
          e.stopPropagation();
          dz.classList.add("drag-over");
        }),
      );
      ;["dragleave", "drop"].forEach((ev) =>
        dz.addEventListener(ev, (e) => {
          e.preventDefault();
          e.stopPropagation();
          dz.classList.remove("drag-over");
        }),
      );
      dz.addEventListener("drop", (e) => {
        const f = e.dataTransfer?.files?.[0];
        if (!f) return;
        $("#file-input").files = e.dataTransfer.files;
        $("#file-input").dispatchEvent(new Event("change"));
      });

      $("#upload-btn").addEventListener("click", async () => {
        const f =
          $("#file-input").files?.[0] ||
          selectedFile;
        if (!f) return;

        const fd = new FormData();
        fd.append("document", f);

        statusMsg.textContent = "Uploading…";
        statusMsg.classList.remove("error", "success");
        $("#upload-btn").disabled = true;

        try {
          statusMsg.textContent = "Processing chunks…";
          const res = await fetch("/api/upload", { method: "POST", body: fd });
          const body = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(body.error || "Upload failed.");

          statusMsg.textContent = `Ready! Document indexed with ${body.chunkCount} chunks.`;
          statusMsg.classList.add("success");
          currentCollectionName = body.collectionName;

          $("#thread").innerHTML = "";
          appendMessage(
            "bot",
            "Document ready! Ask me anything about it.",
          );

          setTimeout(() => {
            setView("chat");
            $("#chat-input").focus();
          }, 1500);
        } catch (e) {
          statusMsg.textContent =
            typeof e.message === "string" ? e.message : "Something went wrong during upload.";
          statusMsg.classList.add("error");
          $("#upload-btn").disabled = false;
        }
      });

      $("#chat-form").addEventListener("submit", (e) => {
        e.preventDefault();
        const txt = $("#chat-input").value.trim();
        if (txt.length) submitChat(txt);
      });

      $("#chat-input").addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          $("#chat-form").dispatchEvent(new Event("submit"));
        }
      });

      $("#btn-new-doc").addEventListener("click", (e) => {
        e.preventDefault();
        resetNotebook();
      });

      setView("upload");
    </script>
  </body>
</html>
